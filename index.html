<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icons/pwa-192.png" />
    <link rel="apple-touch-icon" href="/icons/pwa-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/pwa-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/pwa-192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Theme -->
    <meta name="theme-color" content="#06080f" />
    <meta name="msapplication-TileColor" content="#06080f" />
    <meta name="msapplication-TileImage" content="/icons/pwa-192.png" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="STEA" />

    <!-- Android / General -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="STEA" />
    <meta name="format-detection" content="telephone=no" />

    <!-- SEO -->
    <title>STEA - Kila Kitu Mahali Pamoja</title>
    <meta name="description" content="STEA — Tanzania's premium digital ecosystem. Student tools, tech resources, business services, and shopping in one place." />
    <meta name="keywords" content="STEA, Tanzania, tech, students, online courses, marketplace, digital services" />

    <!-- Open Graph -->
    <meta property="og:title" content="STEA — Digital Ecosystem Tanzania" />
    <meta property="og:description" content="Student tools, tech resources, services & marketplace. All in one place." />
    <meta property="og:image" content="/stea-logo-main.jpg" />
    <meta property="og:type" content="website" />

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Register PWA service worker
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              // Check for updates on page load
              reg.update();
            })
            .catch(() => {});

          // Register FCM service worker
          navigator.serviceWorker.register('/firebase-messaging-sw.js', { scope: '/' })
            .catch(() => {});
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
