<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEA — You're Offline</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #06080f;
      color: #fff;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 420px; }
    .logo-ring {
      width: 88px; height: 88px; border-radius: 50%;
      background: linear-gradient(135deg, #F5A623, #FFD17C);
      display: grid; place-items: center;
      margin: 0 auto 28px;
      box-shadow: 0 0 0 12px rgba(245,166,35,.12), 0 0 0 24px rgba(245,166,35,.06);
      font-size: 36px;
    }
    h1 {
      font-size: clamp(24px, 6vw, 34px);
      font-weight: 900;
      letter-spacing: -.04em;
      margin-bottom: 14px;
      line-height: 1.15;
    }
    .gold { background: linear-gradient(135deg, #F5A623, #FFD17C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    p {
      color: rgba(255,255,255,.45);
      font-size: 15px;
      line-height: 1.72;
      max-width: 360px;
      margin: 0 auto 32px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px; border-radius: 999px;
      background: rgba(245,166,35,.1); border: 1px solid rgba(245,166,35,.22);
      color: #F5A623; font-size: 12px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 28px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px; border-radius: 14px;
      background: linear-gradient(135deg, #F5A623, #FFD17C);
      color: #111; font-weight: 900; font-size: 15px;
      border: none; cursor: pointer; text-decoration: none;
      box-shadow: 0 8px 24px rgba(245,166,35,.35);
      transition: transform .2s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .tip {
      margin-top: 28px;
      padding: 16px 20px; border-radius: 14px;
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07);
      font-size: 13px; color: rgba(255,255,255,.35); line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-ring">📶</div>
    <div class="badge">⚡ STEA App</div>
    <h1>You're <span class="gold">Offline</span></h1>
    <p>No internet connection right now. Check your connection and try again — STEA will be right here when you're back.</p>
    <a href="/" class="btn" onclick="window.location.reload()">🔄 Try Again</a>
    <div class="tip">
      💡 <strong>Tip:</strong> Install STEA on your home screen for faster access and some offline features.
    </div>
  </div>
</body>
</html>
